baseURL = 'https://giorgiaspina.github.io/Hugo/'
languageCode = 'it-IT'
title = 'Il mio sito Hugo'
theme = 'ananke'

[params]
  # Descrizione del sito (appare nel meta og e nel footer)
  description = "Il mio blog personale"

  # Immagine di copertina di default per le pagine senza immagine
  # featured_image = '/images/gohugo-default-sample-hero-image.jpg'

  # Colore sfondo hero (classi Tachyons, es: bg-dark-gray, bg-near-black)
  background_color_class = "bg-near-black"

  # Mostra lettura stimata degli articoli
  show_reading_time = true

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10
  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20
  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 30